trigger:
- main

variables:
  adminUser: 'azureuser'
  adminPass: 'Appr0ved!!!!'
  resourceGroup: 'SAP_RG'
  hanaStorageAccountName: 'hanastorageaccount$(Build.BuildId)'
  containerName: 'hana'
  # storageSasToken: ''
pool:
  vmImage: ubuntu-latest
  
jobs:
  - job: create_storage_account
    displayName: 'Create Storage Account and container for HANA Installer'
    steps:
    - task: AzureCLI@2
      inputs:
        azureSubscription: 'AzureSAPConnection'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          echo "Creating storage account..."
          az storage account create --resource-group $(resourceGroup) --name $(hanaStorageAccountName) \
            --sku Standard_LRS --kind StorageV2 --allow-blob-public-access true
          echo "Creating storage container..."
          az storage container create --account-name $(hanaStorageAccountName) --name $(containerName) --public-access blob

# temporarily not used.
#          echo "Creating SAS token..."
#          storageSasToken=$(az storage container generate-sas --account-name $(hanaStorageAccountName) --name $(containerName) --permissions rwdl \
#          --expiry 2026-06-19T00:00Z --https-only)
#          echo "Storage SAS token: $(storageSasToken)"
#          echo "##vso[task.setvariable variable=storageSasToken]$storageSasToken"

  - job: upload_hana_installer_script
    dependsOn: create_storage_account
    displayName: 'Upload HANA Installer Script to Azure Storage'
    steps:
    - task: AzureCLI@2
      inputs:
        azureSubscription: 'AzureSAPConnection'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          echo "Uploading install-hana-sles.sh..."
          az storage blob upload --account-name $(hanaStorageAccountName) --container-name $(containerName) \
          --name install-hana-sles.sh --file $(Build.SourcesDirectory)/scripts/install-hana-sles.sh --overwrite true --auth-mode key

