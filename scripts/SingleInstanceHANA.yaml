trigger:
- install-only

variables:
  adminUser: 'azureuser'
  adminPass: 'Appr0ved!!!!'
  resourceGroup: 'SAP_RG'
  hanaStorageAccountName: 'hanastorageaccount171'
  containerName: 'hana'

pool:
  vmImage: ubuntu-latest
  
jobs:
  - job: deploy_hana
    displayName: 'Deploy Single Instance HANA'
    steps:
    - task: AzureCLI@2
      inputs:
        azureSubscription: 'AzureSAPConnection'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          echo "Calling install-hana-sles.sh to install HANA..."
          az deployment group create \
            --resource-group $(resourceGroup) \
            --template-file $(Build.SourcesDirectory)/scripts/sip-hana.bicep \
            --parameters adminUsername=$(adminUser) adminPassword=$(adminPass) \
            customScriptFileUri=https://$(hanaStorageAccountName).blob.core.windows.net/$(containerName)/install-hana-sles.sh \
            hanaStorageAccountName=$(hanaStorageAccountName) \
            containerName=$(containerName)
